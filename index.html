<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T.R.C Int'l · Church Manager</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #0b1a2f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: #e2e8f0;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 20% 30%, rgba(30, 58, 95, 0.45) 0%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }
    .system-card {
      max-width: 1440px;
      width: 100%;
      background: #132237;
      border-radius: 36px;
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.7);
      padding: 2rem 2rem 2.5rem;
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(2px);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem 1.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #1e3a5f;
      padding-bottom: 1.25rem;
    }
    .brand h1 {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.3px;
      color: #f0f4fa;
    }
    .brand span {
      font-weight: 400;
      font-size: 0.85rem;
      color: #8aa9d1;
    }
    .cash-summary {
      background: #0d1f33;
      border-radius: 28px;
      padding: 1.25rem 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      border: 1px solid #1e3a5f;
    }
    .cash-total .label { font-weight: 500; color: #8aa9d1; font-size: 1rem; }
    .cash-total .amount { font-weight: 700; font-size: 2.4rem; color: #f0f4fa; letter-spacing: -0.5px; }
    .cash-total .currency { font-weight: 600; color: #6a9bd8; margin-right: 4px; }
    .cash-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .btn {
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      transition: all 0.15s;
      cursor: pointer;
      border: 1px solid #1e3a5f;
      color: #e2e8f0;
      background: #0d1f33;
    }
    .btn-primary { background: #1a5a9c; border-color: #1a5a9c; color: white; box-shadow: 0 4px 12px -4px rgba(26,90,156,0.3); }
    .btn-primary:hover { background: #1a6fc4; transform: translateY(-1px); }
    .btn-outline { background: rgba(13,31,51,0.7); border: 1px solid #2a4a6a; }
    .btn-outline:hover { background: #1a3a5a; border-color: #3a6a9a; }
    .btn-success { background: #1a7a4a; border-color: #1a7a4a; color: white; }
    .btn-success:hover { background: #2a9a5a; transform: translateY(-1px); }
    .btn-danger-small {
      background: #b02a37; border: none; color: white; padding: 0.2rem 0.7rem; border-radius: 30px;
      font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-danger-small:hover { background: #dc3545; transform: scale(1.05); }
    .btn-small {
      padding: 0.5rem 1.2rem; font-size: 0.8rem; border-radius: 40px;
      background: #1a5a9c; color: white; border: none; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.4rem; transition: all 0.15s;
    }
    .btn-small:hover { background: #1a6fc4; transform: translateY(-1px); }
    .btn-dept-add {
      padding: 0.5rem 1.2rem; font-size: 0.8rem; border-radius: 40px;
      background: #1a7a4a; color: white; border: none; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.4rem; transition: all 0.15s;
    }
    .btn-dept-add:hover { background: #2a9a5a; transform: translateY(-1px); }
    .btn-reset {
      background: #7a2a3a; border-color: #7a2a3a; color: white;
    }
    .btn-reset:hover { background: #9a3a4a; transform: translateY(-1px); }

    .branches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .branch-item {
      background: #0d1f33;
      border-radius: 20px;
      padding: 1.25rem 1rem 1rem;
      border: 1px solid #1e3a5f;
      text-align: center;
      transition: all 0.15s;
    }
    .branch-item:hover { border-color: #3a6a9a; background: #112b44; }
    .branch-item i { font-size: 1.6rem; color: #6a9bd8; background: #1a3a5a; padding: 0.7rem; border-radius: 18px; margin-bottom: 0.5rem; }
    .branch-item h4 { font-weight: 600; font-size: 1rem; color: #f0f4fa; }
    .branch-item p { font-size: 0.8rem; color: #8aa9d1; font-weight: 500; }
    .branch-item .badge { background: #1a3a5a; padding: 0.2rem 1rem; border-radius: 50px; font-size: 0.7rem; font-weight: 600; color: #6a9bd8; display: inline-block; margin-top: 8px; }

    .management-panels {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 2rem;
      margin-top: 0.5rem;
    }
    @media (max-width: 780px) { .management-panels { grid-template-columns: 1fr; gap: 2rem; } }

    .panel {
      background: #0d1f33;
      border-radius: 24px;
      padding: 1.5rem 1.5rem 1.8rem;
      border: 1px solid #1e3a5f;
    }
    .panel h3 {
      font-weight: 600;
      font-size: 1.2rem;
      color: #f0f4fa;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px dashed #1e3a5f;
      padding-bottom: 0.7rem;
    }
    .panel h3 i { color: #6a9bd8; }

    .member-list-wrapper { max-height: 280px; overflow-y: auto; padding-right: 4px; margin-bottom: 1rem; scrollbar-width: thin; scrollbar-color: #2a4a6a #0d1f33; }
    .member-list-wrapper::-webkit-scrollbar { width: 6px; }
    .member-list-wrapper::-webkit-scrollbar-track { background: #0d1f33; border-radius: 12px; }
    .member-list-wrapper::-webkit-scrollbar-thumb { background: #2a4a6a; border-radius: 12px; }
    .member-list { display: flex; flex-direction: column; gap: 0.7rem; }

    .dept-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      max-height: 160px;
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: #2a4a6a #0d1f33;
    }
    .dept-list::-webkit-scrollbar { width: 6px; }
    .dept-list::-webkit-scrollbar-track { background: #0d1f33; border-radius: 12px; }
    .dept-list::-webkit-scrollbar-thumb { background: #2a4a6a; border-radius: 12px; }

    .list-item {
      background: #112b44;
      padding: 0.7rem 1rem;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #1e3a5f;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .list-item:hover { border-color: #3a6a9a; background: #1a3a5a; }
    .list-item .info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .list-item .name { font-weight: 600; color: #f0f4fa; font-size: 0.95rem; }
    .list-item .phone { font-size: 0.75rem; color: #8aa9d1; display: flex; align-items: center; gap: 4px; }
    .list-item .phone i { font-size: 0.7rem; color: #6a9bd8; }
    .list-item .position-badge { font-size: 0.7rem; color: #fff; background: #1a5a9c; padding: 0.15rem 0.6rem; border-radius: 30px; width: fit-content; font-weight: 600; }
    .list-item .badge-dept { background: #1a3a5a; padding: 0.2rem 0.8rem; border-radius: 30px; font-size: 0.7rem; font-weight: 600; color: #8aa9d1; margin: 0 0.5rem; white-space: nowrap; }
    .list-item .dept-actions { display: flex; align-items: center; gap: 0.5rem; }

    .add-section {
      margin-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem;
    }
    .add-section input, .add-section select, .dept-add-section input, .dept-add-section select {
      flex: 1 1 120px;
      padding: 0.5rem 0.8rem;
      border-radius: 40px;
      border: 1px solid #1e3a5f;
      background: #0d1f33;
      color: #e2e8f0;
      font-size: 0.85rem;
      outline: none;
      transition: all 0.15s;
    }
    .add-section input::placeholder, .dept-add-section input::placeholder { color: #5a7a9a; }
    .add-section input:focus, .add-section select:focus, .dept-add-section input:focus, .dept-add-section select:focus {
      border-color: #3a6a9a;
      box-shadow: 0 0 0 3px rgba(26,90,156,0.2);
    }
    .phone-input-wrapper { position: relative; flex: 1 1 140px; min-width: 120px; }
    .phone-input-wrapper input { width: 100%; padding-left: 2.2rem; }
    .phone-input-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #5a7a9a; font-size: 0.85rem; }

    .dept-add-section {
      margin-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem;
      padding-top: 1rem;
      border-top: 1px solid #1e3a5f;
    }

    .mini-cash {
      background: #0d1f33;
      border-radius: 18px;
      padding: 0.8rem 1.2rem;
      margin-top: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #1e3a5f;
    }
    .mini-cash span { font-weight: 500; color: #8aa9d1; }
    .mini-cash .value { font-weight: 700; font-size: 1.1rem; color: #f0f4fa; }

    .ledger-wrapper { max-height: 140px; overflow-y: auto; margin-top: 0.5rem; padding-right: 4px; scrollbar-width: thin; scrollbar-color: #2a4a6a #0d1f33; }
    .ledger-wrapper::-webkit-scrollbar { width: 5px; }
    .ledger-wrapper::-webkit-scrollbar-track { background: #0d1f33; border-radius: 12px; }
    .ledger-wrapper::-webkit-scrollbar-thumb { background: #2a4a6a; border-radius: 12px; }
    .ledger-item {
      display: flex; justify-content: space-between; align-items: center;
      background: #112b44; padding: 0.4rem 0.8rem; border-radius: 30px;
      border: 1px solid #1e3a5f; margin-bottom: 0.3rem; font-size: 0.75rem;
    }
    .ledger-item .ledger-type.income { color: #4ade80; }
    .ledger-item .ledger-type.expense { color: #f87171; }
    .ledger-item .ledger-desc { color: #8aa9d1; font-size: 0.7rem; flex: 1; margin: 0 0.5rem; text-align: center; }
    .ledger-item .ledger-time { color: #5a7a9a; font-size: 0.6rem; white-space: nowrap; margin-left: 0.3rem; }
    .ledger-empty { color: #5a7a9a; font-size: 0.8rem; padding: 0.5rem 0; text-align: center; }
    .ledger-header { display: flex; justify-content: space-between; margin-bottom: 0.2rem; }
    .ledger-header span { font-weight: 600; font-size: 0.85rem; color: #8aa9d1; }
    .ledger-header .count { font-size: 0.7rem; color: #5a7a9a; }

    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 640px) { .charts-row { grid-template-columns: 1fr; } }
    .chart-card {
      background: #0d1f33;
      border-radius: 20px;
      padding: 1.25rem;
      border: 1px solid #1e3a5f;
      transition: all 0.15s;
    }
    .chart-card:hover { border-color: #3a6a9a; }
    .chart-card h4 { font-weight: 600; color: #8aa9d1; font-size: 0.9rem; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
    .chart-card h4 i { color: #6a9bd8; }
    .chart-container { position: relative; height: 180px; }
    .chart-container.pie-chart { height: 180px; }
    .chart-legend-note { font-size: 0.65rem; color: #5a7a9a; text-align: center; margin-top: 0.3rem; }

    .footer-note {
      margin-top: 2rem;
      border-top: 1px solid #1e3a5f;
      padding-top: 1.5rem;
      font-size: 0.8rem;
      color: #5a7a9a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .footer-note i { color: #6a9bd8; }
  </style>
</head>
<body>
<div class="system-card">

  <div class="header">
    <div class="brand">
      <h1>T.R.C Int'l Thika</h1>
      <span>Church Management · Landless</span>
    </div>
  </div>

  <div class="cash-summary">
    <div class="cash-total">
      <span class="label"><i class="fas fa-coins" style="margin-right: 8px;"></i> Total cash</span>
      <span class="amount"><span class="currency">KES</span> 0</span>
    </div>
    <div class="cash-actions">
      <button class="btn btn-outline" id="addCashBtn"><i class="fas fa-plus-circle"></i> Income</button>
      <button class="btn btn-outline" id="withdrawCashBtn"><i class="fas fa-minus-circle"></i> Withdraw</button>
      <button class="btn btn-primary" id="refreshCashBtn"><i class="fas fa-sync-alt"></i> Sync</button>
      <button class="btn btn-reset" id="resetSystemBtn"><i class="fas fa-undo-alt"></i> Reset</button>
    </div>
  </div>

  <div class="branches-grid" id="branchesGrid"></div>

  <div class="charts-row">
    <div class="chart-card">
      <h4><i class="fas fa-chart-bar"></i> Last 30 days · Cash flow</h4>
      <div class="chart-container"><canvas id="cashFlowChart"></canvas></div>
      <div class="chart-legend-note">🟢 Income &nbsp;|&nbsp; 🔴 Expense</div>
    </div>
    <div class="chart-card">
      <h4><i class="fas fa-chart-pie"></i> Members by department</h4>
      <div class="chart-container pie-chart"><canvas id="deptPieChart"></canvas></div>
    </div>
  </div>

  <div class="management-panels">
    <div class="panel">
      <h3><i class="fas fa-user-friends"></i> Members</h3>
      <div class="member-list-wrapper">
        <div class="member-list" id="memberList"></div>
      </div>
      <div class="add-section">
        <input type="text" id="memberNameInput" placeholder="Full name" />
        <div class="phone-input-wrapper">
          <i class="fas fa-phone"></i>
          <input type="text" id="memberPhoneInput" placeholder="Phone" />
        </div>
        <select id="memberPositionSelect" class="position-select">
          <option value="Chairperson">Chairperson</option><option value="Vice Chairperson">Vice Chairperson</option>
          <option value="Secretary">Secretary</option><option value="Coordinator">Coordinator</option>
          <option value="Treasurer">Treasurer</option><option value="Member" selected>Member</option>
        </select>
        <select id="memberDeptSelect"></select>
        <button class="btn-small" id="addMemberBtn"><i class="fas fa-user-plus"></i> Add</button>
      </div>
    </div>

    <div class="panel">
      <h3><i class="fas fa-sitemap"></i> Departments <span style="font-size:0.7rem; font-weight:400; color:#5a7a9a; margin-left:0.5rem;">(✕ remove)</span></h3>
      <div class="dept-list" id="deptList"></div>
      <div class="dept-add-section">
        <input type="text" id="newDeptNameInput" placeholder="New dept name" />
        <select id="newDeptIconSelect" class="dept-icon-selector">
          <option value="fa-users">Users</option><option value="fa-music">Music</option>
          <option value="fa-hand-holding-heart">Outreach</option><option value="fa-pray">Prayer</option>
          <option value="fa-bible">Bible</option><option value="fa-children">Children</option>
          <option value="fa-church">Church</option><option value="fa-hands-praying">Praying</option>
        </select>
        <button class="btn-dept-add" id="addDeptBtn"><i class="fas fa-plus"></i> Add</button>
      </div>
      <div class="mini-cash">
        <span><i class="fas fa-wallet"></i> Recent cash</span>
        <span class="value" id="recentCashLabel">KES 0</span>
      </div>
      <div style="margin-top: 0.6rem; display: flex; gap: 0.6rem; flex-wrap: wrap;">
        <button class="btn btn-success btn-small" id="recordIncomeBtn" style="flex:1"><i class="fas fa-plus"></i> Income</button>
        <button class="btn btn-outline btn-small" id="recordExpenseBtn" style="flex:1"><i class="fas fa-minus"></i> Expense</button>
      </div>
      <div style="margin-top: 0.8rem;">
        <div class="ledger-header"><span><i class="fas fa-list-ul"></i> Transactions</span><span class="count" id="ledgerCount">0 entries</span></div>
        <div class="ledger-wrapper" id="ledgerList"><div class="ledger-empty">No transactions yet</div></div>
      </div>
    </div>
  </div>
  <div class="footer-note">
    <span><i class="fas fa-check-circle"></i> System ready · <span id="deptCountDisplay">3</span> departments active</span>
    <span><i class="fas fa-history"></i> Data persisted in memory</span>
  </div>
</div>

<script>
  (function() {
    // ----- DATA (default state) -----
    const DEFAULT_DEPT = {
      'Youth': { members: 0, icon: 'fa-users' },
      'Worship': { members: 0, icon: 'fa-music' },
      'Evangelism': { members: 0, icon: 'fa-hand-holding-heart' }
    };
    const DEFAULT_MEMBERS = [
      { name: 'ANN NJENGA', phone: '0705147835', position: 'Chairperson', dept: 'Youth' },
      { name: 'BENSON MWAURA', phone: '0748338076', position: 'Vice Chairperson', dept: 'Youth' },
      { name: 'PURITY NJOROGE', phone: '0734 567 890', position: 'Secretary', dept: 'Youth' },
      { name: 'VINCENT MWANGANGI', phone: '0711717607', position: 'Chairperson', dept: 'Worship' }
    ];

    // ----- runtime state -----
    let deptData = JSON.parse(JSON.stringify(DEFAULT_DEPT));
    let members = []; // store full member objects for reset
    let cashLedger = [];
    let totalCash = 0;

    // DOM
    const memberList = document.getElementById('memberList');
    const deptList = document.getElementById('deptList');
    const branchesGrid = document.getElementById('branchesGrid');
    const addMemberBtn = document.getElementById('addMemberBtn');
    const memberNameInput = document.getElementById('memberNameInput');
    const memberPhoneInput = document.getElementById('memberPhoneInput');
    const memberPositionSelect = document.getElementById('memberPositionSelect');
    const memberDeptSelect = document.getElementById('memberDeptSelect');
    const newDeptNameInput = document.getElementById('newDeptNameInput');
    const newDeptIconSelect = document.getElementById('newDeptIconSelect');
    const addDeptBtn = document.getElementById('addDeptBtn');
    const deptCountDisplay = document.getElementById('deptCountDisplay');
    const recentCashLabel = document.getElementById('recentCashLabel');
    const ledgerList = document.getElementById('ledgerList');
    const ledgerCount = document.getElementById('ledgerCount');

    let cashFlowChart = null;
    let deptPieChart = null;

    // ----- helpers -----
    function updateDeptSelect() {
      const current = memberDeptSelect.value;
      memberDeptSelect.innerHTML = '';
      Object.keys(deptData).forEach(name => {
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        memberDeptSelect.appendChild(opt);
      });
      if (Object.keys(deptData).includes(current)) memberDeptSelect.value = current;
      else if (Object.keys(deptData).length) memberDeptSelect.value = Object.keys(deptData)[0];
    }

    function updateBranches() {
      branchesGrid.innerHTML = '';
      Object.keys(deptData).forEach(name => {
        const card = document.createElement('div');
        card.className = 'branch-item';
        const icon = deptData[name].icon || 'fa-users';
        const count = deptData[name].members || 0;
        card.innerHTML = `
          <i class="fas ${icon}"></i>
          <h4>${name}</h4>
          <p>${count} members</p>
          <span class="badge">active</span>
        `;
        branchesGrid.appendChild(card);
      });
      updateCharts();
    }

    function updateDeptList() {
      deptList.innerHTML = '';
      Object.keys(deptData).forEach(name => {
        const item = document.createElement('div');
        item.className = 'list-item';
        const icon = deptData[name].icon || 'fa-users';
        const count = deptData[name].members || 0;
        item.innerHTML = `
          <span><i class="fas ${icon}" style="color:#6a9bd8; margin-right: 10px;"></i>${name}</span>
          <div class="dept-actions">
            <span class="badge-dept">${count} members</span>
            <button class="btn-danger-small remove-dept-btn" data-dept="${name}"><i class="fas fa-times"></i></button>
          </div>
        `;
        deptList.appendChild(item);
      });
      document.querySelectorAll('.remove-dept-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          removeDepartment(this.dataset.dept);
        });
      });
      deptCountDisplay.textContent = Object.keys(deptData).length;
      updateCharts();
    }

    function removeDepartment(deptName) {
      if (Object.keys(deptData).length <= 1) { alert('Cannot remove last department.'); return; }
      if ((deptData[deptName]?.members || 0) > 0 && !confirm(`Department "${deptName}" has members. Remove all?`)) return;
      // remove members from this dept
      members = members.filter(m => m.dept !== deptName);
      delete deptData[deptName];
      renderAllMembers();
      updateDeptList(); updateBranches(); updateDeptSelect();
    }

    function addDepartment() {
      const name = newDeptNameInput.value.trim();
      if (!name) { alert('Enter department name.'); return; }
      if (deptData[name]) { alert(`Department "${name}" exists.`); return; }
      deptData[name] = { members: 0, icon: newDeptIconSelect.value };
      updateDeptList(); updateBranches(); updateDeptSelect();
      newDeptNameInput.value = '';
      const btn = addDeptBtn;
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> Added!';
      setTimeout(() => btn.innerHTML = orig, 1500);
    }

    function renderMemberElement(name, phone, position, dept) {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <div class="info">
          <span class="name">${name}</span>
          <span class="phone"><i class="fas fa-phone"></i> ${phone}</span>
          <span class="position-badge">${position}</span>
        </div>
        <span class="badge-dept">${dept}</span>
        <span class="action-icon"><i class="fas fa-ellipsis-v"></i></span>
      `;
      memberList.appendChild(item);
    }

    function renderAllMembers() {
      memberList.innerHTML = '';
      members.forEach(m => {
        renderMemberElement(m.name, m.phone, m.position, m.dept);
      });
    }

    function addMember() {
      const name = memberNameInput.value.trim();
      const phone = memberPhoneInput.value.trim();
      const position = memberPositionSelect.value;
      const dept = memberDeptSelect.value;
      if (!name) { alert('Enter member name.'); return; }
      if (!phone) { alert('Enter phone number.'); return; }
      if (!deptData[dept]) { alert('Department no longer exists.'); updateDeptSelect(); return; }
      // add to members array
      members.push({ name, phone, position, dept });
      deptData[dept].members = (deptData[dept].members || 0) + 1;
      renderAllMembers();
      updateDeptList(); updateBranches();
      memberNameInput.value = ''; memberPhoneInput.value = '';
      const btn = addMemberBtn;
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> Added!';
      btn.style.background = '#1a7a4a';
      setTimeout(() => { btn.innerHTML = orig; btn.style.background = '#1a5a9c'; }, 1500);
    }

    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString('en-KE', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function renderLedger() {
      ledgerList.innerHTML = '';
      if (cashLedger.length === 0) {
        ledgerList.innerHTML = '<div class="ledger-empty">No transactions yet</div>';
        ledgerCount.textContent = '0 entries';
        return;
      }
      const reversed = [...cashLedger].reverse();
      reversed.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'ledger-item';
        const typeClass = entry.type === 'income' ? 'income' : 'expense';
        const sign = entry.type === 'income' ? '+' : '-';
        div.innerHTML = `
          <span class="ledger-type ${typeClass}">${entry.type === 'income' ? '📈 Income' : '📉 Expense'}</span>
          <span class="ledger-desc">${entry.description || ''}</span>
          <span class="ledger-amount" style="color:${entry.type === 'income' ? '#4ade80' : '#f87171'}">${sign} KES ${entry.amount.toLocaleString()}</span>
          <span class="ledger-time">${formatTime(entry.timestamp)}</span>
        `;
        ledgerList.appendChild(div);
      });
      ledgerCount.textContent = `${cashLedger.length} entries`;
    }

    function updateCashDisplay() {
      const amountEl = document.querySelector('.cash-total .amount');
      if (amountEl) amountEl.innerHTML = `<span class="currency">KES</span> ${totalCash.toLocaleString()}`;
      if (cashLedger.length > 0) {
        const last = cashLedger[cashLedger.length - 1];
        const sign = last.type === 'income' ? '+' : '-';
        recentCashLabel.textContent = `${sign} KES ${last.amount.toLocaleString()}`;
      } else { recentCashLabel.textContent = 'KES 0'; }
      renderLedger();
      updateCharts();
    }

    // ----- CHART: last 30 days (simulated with ledger entries) -----
    function buildLast30DaysData() {
      const now = new Date();
      const dayLabels = [];
      const incomeMap = {};
      const expenseMap = {};
      for (let i = 29; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().split('T')[0];
        dayLabels.push(key);
        incomeMap[key] = 0;
        expenseMap[key] = 0;
      }
      cashLedger.forEach(entry => {
        if (!entry.timestamp) return;
        const d = new Date(entry.timestamp);
        const key = d.toISOString().split('T')[0];
        if (incomeMap.hasOwnProperty(key)) {
          if (entry.type === 'income') incomeMap[key] += entry.amount;
          else expenseMap[key] += entry.amount;
        }
      });
      const labels = dayLabels.map(d => d.slice(5)); // MM-DD
      const incomeData = dayLabels.map(d => incomeMap[d] || 0);
      const expenseData = dayLabels.map(d => expenseMap[d] || 0);
      return { labels, incomeData, expenseData };
    }

    function updateCharts() {
      // Pie chart
      const deptNames = Object.keys(deptData);
      const deptCounts = deptNames.map(n => deptData[n].members || 0);
      const colors = ['#4ade80', '#6a9bd8', '#fbbf24', '#f87171', '#a78bfa', '#34d399', '#f472b6', '#60a5fa'];
      if (deptPieChart) deptPieChart.destroy();
      const pieCtx = document.getElementById('deptPieChart').getContext('2d');
      deptPieChart = new Chart(pieCtx, {
        type: 'doughnut',
        data: {
          labels: deptNames,
          datasets: [{ data: deptCounts, backgroundColor: colors.slice(0, deptNames.length), borderColor: '#132237', borderWidth: 2 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { color: '#8aa9d1', font: { size: 10 }, boxWidth: 12, padding: 8 } }
          }
        }
      });

      // Bar chart: last 30 days
      const { labels, incomeData, expenseData } = buildLast30DaysData();
      if (cashFlowChart) cashFlowChart.destroy();
      const flowCtx = document.getElementById('cashFlowChart').getContext('2d');
      cashFlowChart = new Chart(flowCtx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'Income', data: incomeData, backgroundColor: 'rgba(74, 222, 128, 0.7)', borderColor: '#4ade80', borderWidth: 1, borderRadius: 4, stack: 'stack1' },
            { label: 'Expense', data: expenseData.map(v => -v), backgroundColor: 'rgba(248, 113, 113, 0.7)', borderColor: '#f87171', borderWidth: 1, borderRadius: 4, stack: 'stack1' }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { color: '#8aa9d1', font: { size: 10 }, boxWidth: 12, padding: 8 } },
            tooltip: { callbacks: { label: function(ctx) { let val = Math.abs(ctx.raw || 0); return `${ctx.dataset.label}: KES ${val.toLocaleString()}`; } } }
          },
          scales: {
            y: { ticks: { color: '#8aa9d1', font: { size: 9 }, callback: v => 'KES ' + Math.abs(v).toLocaleString() }, grid: { color: '#1e3a5f' } },
            x: { ticks: { color: '#8aa9d1', font: { size: 8 }, maxTicksLimit: 15 }, grid: { display: false } }
          }
        }
      });
    }

    function addIncome() {
      const amount = prompt('Enter income (KES):', '5000');
      if (amount === null) return;
      const val = parseInt(amount);
      if (isNaN(val) || val <= 0) { alert('Enter valid positive number.'); return; }
      const desc = prompt('Description:', 'Offering') || 'Income';
      totalCash += val;
      cashLedger.push({ type: 'income', amount: val, description: desc, timestamp: new Date().toISOString() });
      updateCashDisplay();
      alert(`✅ Income KES ${val.toLocaleString()} added. Balance: KES ${totalCash.toLocaleString()}`);
    }

    function withdrawCash() {
      const amount = prompt('Enter expense (KES):', '2000');
      if (amount === null) return;
      const val = parseInt(amount);
      if (isNaN(val) || val <= 0) { alert('Enter valid positive number.'); return; }
      if (val > totalCash) { alert(`❌ Insufficient cash. Available: KES ${totalCash.toLocaleString()}`); return; }
      const desc = prompt('Description:', 'Expense') || 'Expense';
      totalCash -= val;
      cashLedger.push({ type: 'expense', amount: val, description: desc, timestamp: new Date().toISOString() });
      updateCashDisplay();
      alert(`✅ Expense KES ${val.toLocaleString()} recorded. Balance: KES ${totalCash.toLocaleString()}`);
    }

    // ----- RESET FUNCTION -----
    function resetSystem() {
      if (!confirm('⚠️ Reset all data? This will clear members, departments, and transactions.')) return;
      // reset data
      deptData = JSON.parse(JSON.stringify(DEFAULT_DEPT));
      members = DEFAULT_MEMBERS.map(m => ({ ...m }));
      cashLedger = [];
      totalCash = 0;

      // re-count members in dept
      Object.keys(deptData).forEach(d => deptData[d].members = 0);
      members.forEach(m => {
        if (deptData[m.dept]) deptData[m.dept].members += 1;
      });

      // re-render
      renderAllMembers();
      updateDeptList();
      updateBranches();
      updateDeptSelect();
      updateCashDisplay();
      alert('✅ System reset to default state.');
    }

    // ----- seed demo transactions (for visual) -----
    function seedDemoTransactions() {
      const now = new Date();
      const amounts = [1200, 500, 3000, 1500, 800, 2200, 900, 4000, 600, 2500, 1000, 700, 1800, 3200];
      for (let i = 0; i < 22; i++) {
        const d = new Date(now);
        d.setDate(d.getDate() - Math.floor(Math.random() * 28) - 1);
        const isIncome = Math.random() > 0.4;
        const amt = amounts[Math.floor(Math.random() * amounts.length)];
        if (isIncome) {
          totalCash += amt;
          cashLedger.push({ type: 'income', amount: amt, description: 'Offering', timestamp: d.toISOString() });
        } else {
          if (totalCash >= amt) { totalCash -= amt; cashLedger.push({ type: 'expense', amount: amt, description: 'Expense', timestamp: d.toISOString() }); }
        }
      }
      totalCash += 2500;
      cashLedger.push({ type: 'income', amount: 2500, description: 'Thanksgiving', timestamp: new Date().toISOString() });
    }

    // ----- init -----
    function initializeSystem() {
      // build members from default
      members = DEFAULT_MEMBERS.map(m => ({ ...m }));
      // count members per dept
      Object.keys(deptData).forEach(d => deptData[d].members = 0);
      members.forEach(m => {
        if (deptData[m.dept]) deptData[m.dept].members += 1;
      });
      seedDemoTransactions();
      renderAllMembers();
      updateDeptList();
      updateBranches();
      updateDeptSelect();
      updateCashDisplay();
    }

    // event listeners
    document.getElementById('addCashBtn').addEventListener('click', addIncome);
    document.getElementById('withdrawCashBtn').addEventListener('click', withdrawCash);
    document.getElementById('refreshCashBtn').addEventListener('click', function() {
      alert(`🔄 Synced. Balance: KES ${totalCash.toLocaleString()}\nTransactions: ${cashLedger.length}`);
    });
    document.getElementById('recordIncomeBtn').addEventListener('click', addIncome);
    document.getElementById('recordExpenseBtn').addEventListener('click', withdrawCash);
    addMemberBtn.addEventListener('click', addMember);
    addDeptBtn.addEventListener('click', addDepartment);
    document.getElementById('resetSystemBtn').addEventListener('click', resetSystem);
    memberNameInput.addEventListener('keypress', e => { if (e.key === 'Enter') addMember(); });
    memberPhoneInput.addEventListener('keypress', e => { if (e.key === 'Enter') addMember(); });
    newDeptNameInput.addEventListener('keypress', e => { if (e.key === 'Enter') addDepartment(); });
    memberList.addEventListener('click', (e) => {
      const item = e.target.closest('.list-item');
      if (item) {
        const name = item.querySelector('.name')?.textContent || '';
        const phone = item.querySelector('.phone')?.textContent?.trim() || '';
        const position = item.querySelector('.position-badge')?.textContent || '';
        const dept = item.querySelector('.badge-dept')?.textContent || 'N/A';
        alert(`👤 ${name}\n📞 ${phone}\n📌 ${position}\n🏷️ ${dept}`);
      }
    });
    deptList.addEventListener('click', (e) => {
      const item = e.target.closest('.list-item');
      if (item && !e.target.closest('.remove-dept-btn')) {
        const name = item.querySelector('span:first-child')?.textContent?.trim() || '';
        const count = deptData[name]?.members || 0;
        alert(`🏛️ ${name}\n👥 ${count} members`);
      }
    });

    initializeSystem();
  })();
</script>
</body>
</html>
